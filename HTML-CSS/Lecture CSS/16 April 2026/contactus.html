<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .leftSide{
            height: 400px;
            width: 700px;
            border: solid 0px black;
            border-radius: 50px;
        }
        .rightSide{
            height: 400px;
            width: 600px;
            border: solid 0px black;
        }
        table{
            margin: auto;
            margin-top: 50px;
        }
        h1 , p{
           text-align: center; 
        }
        label{
            font-size: 25px;
        }
        input{
            border: solid 1px black;
            border-radius: 20px;
            height: 30px;
            width: 400px;
            margin: 10px;
        }
        textarea{
            height: 200px;
            width: 400px;
            border: solid 1px black;
            border-radius: 20px;
            margin-left: 10px;
        }
        
    </style>
</head>
<body>
    
    <h1>Contact Us</h1>
    <p>For any inquiries, please contact us at:</p>

    <table>
        <tr>
            <td class="leftSide">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d120653.15095037763!2d72.87114287268241!3d19.089618718818066!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7c85099bd2947%3A0x1ecc1a60c474a8ae!2sChhatrapati%20Shivaji%20Maharaj%20International%20Airport%20Mumbai!5e0!3m2!1sen!2sin!4v1776305467751!5m2!1sen!2sin" width="700" height="400" style="border-radius: 50px;border: solid 10px black;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </td>
            <td class="rightSide">
                <table>
                    <tr>
                        <td>
                            <label>Name:</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label>Email:</label>
                        </td>
                        <td>
                            <input type="email">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label>Mobile:</label>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label>Address:</label>
                        </td>
                        <td>
                            <textarea></textarea>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
    

</body>
</html>
